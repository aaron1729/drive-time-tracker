name: Fetch drive time

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fetch script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: node fetch.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "data: add drive time sample"

          # Retry the push in case a concurrent run pushed first. On rejection,
          # rebase our commit onto the latest main and try again. The data files
          # use a union merge (see .gitattributes) so appended lines never conflict.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing on origin/main and retrying"
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1
