<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive Time Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    h1 { font-size: 1.4rem; }
    .route-block {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      max-width: 900px;
    }
    .route-block h2 { font-size: 1rem; margin-bottom: 1rem; color: #444; }
    .status { margin-top: 0.75rem; font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
  <h1>Drive Time Tracker</h1>
  <div id="charts"></div>

  <script>
    const COLORS = ["#2563eb", "#dc2626"];

    async function loadRoute(route, color) {
      const block = document.createElement("div");
      block.className = "route-block";

      const title = document.createElement("h2");
      title.textContent = route.label;
      block.appendChild(title);

      const canvas = document.createElement("canvas");
      block.appendChild(canvas);

      const status = document.createElement("div");
      status.className = "status";
      status.textContent = "Loading…";
      block.appendChild(status);

      document.getElementById("charts").appendChild(block);

      let rows = [];
      try {
        const res = await fetch(`data/${route.id}.jsonl`);
        const text = await res.text();
        rows = text.trim().split("\n").filter(Boolean).map(l => JSON.parse(l));
      } catch (e) {
        status.textContent = `Error loading data: ${e.message}`;
        return;
      }

      if (rows.length === 0) {
        status.textContent = "No data yet — check back after the first scheduled run.";
        return;
      }

      const latest = rows[rows.length - 1];
      status.textContent = `Last updated: ${new Date(latest.timestamp).toLocaleString()} · ${latest.minutes} min · ${rows.length} samples`;

      new Chart(canvas, {
        type: "line",
        data: {
          labels: rows.map(r => new Date(r.timestamp)),
          datasets: [{
            label: "Drive time (min)",
            data: rows.map(r => r.minutes),
            borderColor: color,
            backgroundColor: color.replace(")", ", 0.08)").replace("rgb", "rgba"),
            borderWidth: 2,
            pointRadius: rows.length > 200 ? 0 : 3,
            tension: 0.2,
            fill: true,
          }],
        },
        options: {
          responsive: true,
          scales: {
            x: {
              type: "time",
              time: { tooltipFormat: "MMM d, h:mm a" },
              title: { display: true, text: "Time" },
              min: new Date(Math.max(
                new Date(rows[0].timestamp).getTime(),
                Date.now() - 7 * 24 * 60 * 60 * 1000
              )).toISOString(),
            },
            y: {
              title: { display: true, text: "Minutes" },
              beginAtZero: false,
            },
          },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => `${ctx.parsed.y} min` } },
          },
        },
      });
    }

    async function load() {
      const configRes = await fetch("config.json");
      const config = await configRes.json();
      for (let i = 0; i < config.routes.length; i++) {
        await loadRoute(config.routes[i], COLORS[i % COLORS.length]);
      }
    }

    load().catch(err => {
      document.getElementById("charts").textContent = `Error: ${err.message}`;
    });
  </script>
</body>
</html>
