<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive Time Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    #subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    #chart-container {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      max-width: 900px;
    }
    #status { margin-top: 1rem; font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
  <h1>Drive Time Tracker</h1>
  <div id="subtitle">Loading…</div>
  <div id="chart-container">
    <canvas id="chart"></canvas>
  </div>
  <div id="status"></div>

  <script>
    async function load() {
      const configRes = await fetch("config.json");
      const config = await configRes.json();
      document.getElementById("subtitle").textContent = config.label || `${config.origin} → ${config.destination}`;

      const dataRes = await fetch("data/history.jsonl");
      const text = await dataRes.text();
      const rows = text.trim().split("\n").filter(Boolean).map(l => JSON.parse(l));

      if (rows.length === 0) {
        document.getElementById("status").textContent = "No data yet — check back after the first scheduled run.";
        return;
      }

      const labels = rows.map(r => new Date(r.timestamp));
      const values = rows.map(r => r.minutes);

      const latest = rows[rows.length - 1];
      document.getElementById("status").textContent =
        `Last updated: ${new Date(latest.timestamp).toLocaleString()} · ${latest.minutes} min · ${rows.length} samples`;

      new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Drive time (min)",
            data: values,
            borderColor: "#2563eb",
            backgroundColor: "rgba(37,99,235,0.08)",
            borderWidth: 2,
            pointRadius: rows.length > 200 ? 0 : 3,
            tension: 0.2,
            fill: true,
          }],
        },
        options: {
          responsive: true,
          scales: {
            x: {
              type: "time",
              time: { tooltipFormat: "MMM d, h:mm a" },
              title: { display: true, text: "Time" },
            },
            y: {
              title: { display: true, text: "Minutes" },
              beginAtZero: false,
            },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.parsed.y} min`,
              },
            },
          },
        },
      });
    }

    load().catch(err => {
      document.getElementById("status").textContent = `Error loading data: ${err.message}`;
    });
  </script>
</body>
</html>
